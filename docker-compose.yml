version: '3.9'

services:

  #####################
  # MariaDB
  #####################
  mariadb:
    image: mariadb:10.5
    container_name: mariadb
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: Aa01117050928
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - spring-net

  #####################
  # Kafka (KRaft mode)
  #####################
  kafka:
    image: bitnami/kafka:3.9
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_KRAFT_CLUSTER_ID=kraft-cluster-12345
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
    networks:
      - spring-net

  #####################
  # Eureka Server
  #####################
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      SERVER_PORT: 8761
      EUREKA_PREFER_IP: true
      EUREKA_REGISTER_WITH: false
      EUREKA_FETCH_REGISTRY: false
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka
      UUID_STORAGE_TYPE: VARCHAR
    networks:
      - spring-net

  ####################
  # User Service (8085)
  ####################
  user-service:
    build: ./user-service
    container_name: user-service
    depends_on:
      - eureka-server
      - mariadb
      - kafka
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
      DB_URL: jdbc:mariadb://mariadb:3306/userdb
      DB_USER: Ahmed
      DB_PASS: Aa01117050928
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      HIBERNATE_DDL_AUTO: update
      HIBERNATE_ID_MAPPINGS: false
      UUID_STORAGE_TYPE: VARCHAR

    networks:
      - spring-net


  ####################
  # Book Service (8086)
  ####################
  book-service:
    build: ./book-service
    container_name: book-service
    depends_on:
      - eureka-server
      - mariadb
      - kafka
    ports:
      - "8086:8086"  # 1:1 mapping
    networks:
      - spring-net
    environment:
      SERVER_PORT: 8086
      DB_URL: jdbc:mariadb://mariadb:3306/bookdb
      DB_USER: Ahmed
      DB_PASS: Aa01117050928
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      HIBERNATE_DDL_AUTO: update
      HIBERNATE_ID_MAPPINGS: false
      UUID_STORAGE_TYPE: VARCHAR

  ###################
  # API Gateway (8080)
  ###################
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    depends_on:
      - user-service
      - book-service
      - eureka-server
    ports:
      - "8080:8080"
    environment:
        SERVER_PORT: 8080
        EUREKA_SERVER_URL: http://eureka-server:8761/eureka
    networks:
      - spring-net

volumes:
  mariadb-data:

networks:
  spring-net:
    driver: bridge
