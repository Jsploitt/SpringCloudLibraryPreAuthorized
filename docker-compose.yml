services:

  # ── LocalStack: emulates AWS SQS locally (no real AWS account needed) ──────
  localstack:
    image: localstack/localstack:3
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs
      DEFAULT_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - localstack-data:/var/lib/localstack
    networks:
      - spring-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Creates the SQS queue in LocalStack on first boot
  localstack-init:
    image: amazon/aws-cli:2.17.0
    container_name: localstack-init
    depends_on:
      localstack:
        condition: service_healthy
    command:
      - sqs
      - create-queue
      - --queue-name
      - user-name-changes
      - --endpoint-url
      - http://localstack:4566
      - --region
      - us-east-1
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    networks:
      - spring-net

  # ── Eureka Server ─────────────────────────────────────────────────────────
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      SERVER_PORT: 8761
      EUREKA_PREFER_IP: "true"
      EUREKA_REGISTER_WITH: "false"
      EUREKA_FETCH_REGISTRY: "false"
      EUREKA_URL: http://eureka-server:8761/eureka
    networks:
      - spring-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ── User Service ──────────────────────────────────────────────────────────
  # Database: H2 (created automatically on startup — no DB setup needed)
  user-service:
    build: ./user-service
    container_name: user-service
    restart: unless-stopped
    depends_on:
      eureka-server:
        condition: service_healthy
      localstack-init:
        condition: service_completed_successfully
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
      EUREKA_URL: http://eureka-server:8761/eureka
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-replace-in-prod}
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_SQS_ENDPOINT_OVERRIDE: http://localstack:4566
      USER_NAME_CHANGES_QUEUE_URL: http://localstack:4566/000000000000/user-name-changes
    networks:
      - spring-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8085/actuator/health"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 5

  # ── Book Service ──────────────────────────────────────────────────────────
  # Database: H2 (created automatically on startup — no DB setup needed)
  book-service:
    build: ./book-service
    container_name: book-service
    restart: unless-stopped
    depends_on:
      eureka-server:
        condition: service_healthy
      user-service:
        condition: service_healthy
      localstack-init:
        condition: service_completed_successfully
    ports:
      - "8086:8086"
    environment:
      SERVER_PORT: 8086
      EUREKA_URL: http://eureka-server:8761/eureka
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-replace-in-prod}
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_SQS_ENDPOINT_OVERRIDE: http://localstack:4566
      USER_NAME_CHANGES_QUEUE_URL: http://localstack:4566/000000000000/user-name-changes
      USER_SERVICE_URL: http://user-service:8085
    networks:
      - spring-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8086/actuator/health"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 5

  # ── API Gateway ───────────────────────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    restart: unless-stopped
    depends_on:
      eureka-server:
        condition: service_healthy
      user-service:
        condition: service_healthy
      book-service:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      EUREKA_URL: http://eureka-server:8761/eureka
    networks:
      - spring-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 5

volumes:
  localstack-data:

networks:
  spring-net:
    driver: bridge
