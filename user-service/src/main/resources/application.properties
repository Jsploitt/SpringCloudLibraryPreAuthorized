spring.application.name=user-service
server.port=${SERVER_PORT:8085}

# Database
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:userdb}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.id.new_generator_mappings=${HIBERNATE_ID_MAPPINGS:false}
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=${UUID_STORAGE_TYPE:VARCHAR}

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

# JWT
jwt.secret=${JWT_SECRET:5367566859703373367639792F423F452848284D6251655468576D5A71347437}

# AWS SQS
aws.region=${AWS_REGION:us-east-1}
aws.sqs.queue-url=${USER_NAME_CHANGES_QUEUE_URL:http://localhost:4566/000000000000/user-name-changes}
aws.sqs.endpoint-override=${AWS_SQS_ENDPOINT_OVERRIDE:}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
