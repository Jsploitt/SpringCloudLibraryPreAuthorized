spring.application.name=book-service
server.port=${SERVER_PORT:8086}

# Database
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bookdb}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:3}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:1}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.id.new_generator_mappings=${HIBERNATE_ID_MAPPINGS:false}
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=${UUID_STORAGE_TYPE:VARCHAR}

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true
spring.cloud.inetutils.preferred-networks=10.

# JWT
jwt.secret=${JWT_SECRET:5367566859703373367639792F423F452848284D6251655468576D5A71347437}

# AWS SQS
aws.region=${AWS_REGION:us-east-1}
aws.sqs.queue-url=${USER_NAME_CHANGES_QUEUE_URL:http://localhost:4566/000000000000/user-name-changes}
aws.sqs.endpoint-override=${AWS_SQS_ENDPOINT_OVERRIDE:}
sqs.poll-interval-ms=${SQS_POLL_INTERVAL_MS:5000}

# User service URL (used for direct REST calls via load-balanced RestTemplate)
user.service.url=${USER_SERVICE_URL:http://user-service}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
