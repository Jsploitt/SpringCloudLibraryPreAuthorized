name: Build and Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger

env:
  AWS_REGION: us-east-1
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Java 21 setup ─────────────────────────────────────────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # ── 3. Build all modules ─────────────────────────────────────────────────
      - name: Build with Maven
        run: mvn clean package -DskipTests --no-transfer-progress

      # ── 4. AWS credentials via OIDC ──────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── 5. Login to ECR ───────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 6. Build & push Docker images ────────────────────────────────────────
      - name: Build and push Docker images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          PROJECT=library-prod

          for SERVICE in eureka-server api-gateway user-service book-service; do
            REPO="${ECR_REGISTRY}/${PROJECT}/${SERVICE}"
            echo "Building ${SERVICE}..."
            docker build -t "${REPO}:${IMAGE_TAG}" -t "${REPO}:latest" "./${SERVICE}"
            docker push "${REPO}:${IMAGE_TAG}"
            docker push "${REPO}:latest"
            echo "Pushed ${SERVICE} → ${REPO}:${IMAGE_TAG}"
          done

      # ── 7. Force ECS redeployment with new images ────────────────────────────
      - name: Force ECS service redeployment
        run: |
          CLUSTER=library-prod-cluster
          for SERVICE in eureka-server api-gateway user-service book-service; do
            aws ecs update-service \
              --cluster "${CLUSTER}" \
              --service "${SERVICE}" \
              --force-new-deployment \
              --region "${AWS_REGION}" \
              --no-cli-pager
          done

      # ── 8. Summary ────────────────────────────────────────────────────────────
      - name: Deployment summary
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "### Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "- Image tag: \`${IMAGE_TAG}\`" >> $GITHUB_STEP_SUMMARY
